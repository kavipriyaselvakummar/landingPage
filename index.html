<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Landing Page</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background-image: linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
      url("https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f");
      background-size:cover;
      background-position:center;
      height:100vh;
      color:white;
    }

    nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px 60px;
    }

    .logo{
      font-size:32px;
      font-weight:bold;
      color:#ff4da6;
    }

    .menu a{
      text-decoration:none;
      color:white;
      margin-left:25px;
      font-size:18px;
      transition:0.3s;
    }

    .menu a:hover{
      color:#ff4da6;
    }

    .hero{
      height:85vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      text-align:center;
      padding:20px;
    }

    .hero h1{
      font-size:70px;
      margin-bottom:20px;
    }

    .hero p{
      font-size:22px;
      width:60%;
      margin-bottom:30px;
      line-height:35px;
    }

    .btn{
      padding:15px 35px;
      border:none;
      border-radius:30px;
      background:#ff4da6;
      color:white;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      background:white;
      color:#ff4da6;
    }

    .music-icons{
      margin-top:40px;
      font-size:40px;
    }

    .music-icons span{
      margin:15px;
    }

  </style>
</head>

<body>

  <nav>
    <div class="logo">MusicWave</div>

    <div class="menu">
      <a href="#">Home</a>
      <a href="#">Playlist</a>
      <a href="#">Artists</a>
      <a href="#">Premium</a>
      <a href="#">Contact</a>
    </div>
  </nav>

  <section class="hero">
    <h1>Feel The Music</h1>

    <p>
      Stream millions of songs, discover trending artists,
      and enjoy music anytime anywhere.
    </p>

    <button class="btn">Listen Now</button>

    <div class="music-icons">
      <span>🎵</span>
      <span>🎧</span>
      <span>🎸</span>
      <span>🥁</span>
    </div>
  </section>

</body>
</html>
